<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel slider</title>
</head>

<body>

  <h1>Slideshow</h1>

  <h2>Default transition</h2>
  <!--MODULE BEGIN-->
  <div class="glm-slideshow" data-transition-type="default" data-transition-duration="1500" data-slide-duration="1500" data-mode="automatic">
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-1.jpg" />
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-2.jpg" />
  </div>


  <h2>Lens transition</h2>
  <!--MODULE BEGIN-->
  <div class="glm-slideshow" data-transition-type="lens" data-transition-duration="1500" data-slide-duration="1500" data-mode="automatic">
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-1.jpg" />
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-2.jpg" />
  </div>


  <h2>Store transition</h2>
  <div class="glm-slideshow" data-transition-type="store" data-transition-duration="1500" data-slide-duration="1500" data-mode="automatic">
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-1.jpg" />
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-2.jpg" />
  </div>


  <h2>Swipe transition</h2>
  <div class="glm-slideshow" data-transition-type="swipe" data-transition-duration="3500" data-slide-duration="1500" data-mode="automatic">
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-1.jpg" />
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-2.jpg" />
  </div>
  
  <h2>Swipe transition</h2>
  <div class="glm-slideshow" data-transition-type="swipe" data-transition-duration="3500" data-slide-duration="1500" data-mode="automatic">
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-1.jpg" />
    <img class="glm-slideshow-img" alt="galaxy picture" src="./assets/picture-2.jpg" />
  </div>

  
  <script type="module" src="./scripts/index.js"></script>
  <!--MODULE END-->

</body>

</html>
