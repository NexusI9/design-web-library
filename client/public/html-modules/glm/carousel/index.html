<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content=
  "width=device-width, initial-scale=1.0">
  <title>Carousel slider</title>
</head>
<body>
  <h1>Carousels</h1><!--MODULE BEGIN-->
  <section class="glm-carousel-wrapper" draggable="false"
  data-curve="outward" data-direction="right" data-picture-width=
  "340" data-picture-height="544" data-invert-drag="0">
    <ul class="glm-carousel-list">
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample.jpg"
      data-full-picture="./assets/sample.jpg"
      alt="sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-2.jpg"
      data-full-picture=
      "./assets/sample-2.jpg" alt=
      "sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-3.jpg"
      data-full-picture=
      "./assets/sample-3.jpg" alt=
      "sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-4.jpg"
      data-full-picture=
      "./assets/sample-4.jpg" alt=
      "sample picture"></li>
    </ul>
  </section>
  <div class="glm-carousel-viewer"><img src="./assets/sample.jpg"
  class="glm-carousel-viewer-picture" alt="viewer picture"></div>
  <!--MODULE END-->
  <!--MODULE BEGIN-->
  <section class="glm-carousel-wrapper" draggable="false"
  data-curve="inward" data-direction="right" data-picture-width=
  "240" data-picture-height="300" data-picture-amount="20"
  data-min-radius="200" data-invert-drag="1" data-border-radius=
  "40" data-border-smooth="4">
    <ul class="glm-carousel-list">
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample.jpg"
      data-full-picture="./assets/sample.jpg"
      alt="sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-2.jpg"
      data-full-picture=
      "./assets/sample-2.jpg" alt=
      "sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-3.jpg"
      data-full-picture=
      "./assets/sample-3.jpg" alt=
      "sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-4.jpg"
      data-full-picture=
      "./assets/sample-4.jpg" alt=
      "sample picture"></li>
    </ul>
  </section>
  <div class="glm-carousel-viewer"><img src="./assets/sample.jpg"
  class="glm-carousel-viewer-picture" alt="viewer picture"></div>
  <!--MODULE END-->
  <!--MODULE BEGIN-->
  <section class="glm-carousel-wrapper" draggable="false"
  data-curve="fan" data-direction="right" data-picture-width="240"
  data-picture-height="350" data-picture-amount="20"
  data-min-radius="1400" data-invert-drag="0" data-border-radius=
  "10" data-border-smooth="3">
    <ul class="glm-carousel-list">
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample.jpg"
      data-full-picture="./assets/sample.jpg"
      alt="sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-2.jpg"
      data-full-picture=
      "./assets/sample-2.jpg" alt=
      "sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-3.jpg"
      data-full-picture=
      "./assets/sample-3.jpg" alt=
      "sample picture"></li>
      <li><img class="glm-carousel-picture" src=
      "./assets/thumbnails/sample-4.jpg"
      data-full-picture=
      "./assets/sample-4.jpg" alt=
      "sample picture"></li>
    </ul>
  </section>
  <div class="glm-carousel-viewer"><img src="./assets/sample.jpg"
  class="glm-carousel-viewer-picture" alt="viewer picture"></div>
  <script type="module" src=
  "./scripts/index.js"></script> 
  <!--MODULE END-->
   
  <script type="module" src="./index.js"></script>
</body>
</html>
